<VirtualHost *:80>
	ServerAdmin webmaster@scribble.ke
	DocumentRoot /var/www/scribble.ke/public
        ServerName scribble.ke
        <Directory /var/www/scribble.ke>
          Options Indexes FollowSymLinks
          AllowOverride All
          Require all granted
        </Directory>
	ErrorLog ${APACHE_LOG_DIR}/scribble_ke_errorlog
        CustomLog ${APACHE_LOG_DIR}/scribble_ke_access.log combined
RewriteEngine on
RewriteCond %{SERVER_NAME} =scribble.ke
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

